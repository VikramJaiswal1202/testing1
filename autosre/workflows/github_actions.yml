name: AutoSRE Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor-and-remediate:
    runs-on: ubuntu-latest
    
    env:
      PROMETHEUS_URL: ${{ secrets.PROMETHEUS_URL }}
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_USER: ${{ secrets.GRAFANA_USER }}
      GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
      # Required for GitHub API agent
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          # Fetch full history so we can analyze recent commits
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run AutoSRE Pipeline
        run: python autosre/main.py

      - name: Upload Incident Reports if generated
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: autosre-incident-reports
          path: autosre/reports/incident_reports/*.md
